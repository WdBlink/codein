name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate tag matches manifest version
        run: |
          VERSION="$(node -p "require('./manifest.json').version")"
          test "v${VERSION}" = "${GITHUB_REF_NAME}"

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Verify release files
        run: npm run verify:release

      - name: Attest release files
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Write release notes
        run: |
          cat > release-notes.md <<'EOF'
          ## Changes

          - Reduce Obsidian Community Scorecard review risks.
          - Preserve right-sidebar activation without requiring the newer `Workspace.revealLeaf` API.
          - Improve popout-window compatibility and child-process environment handling.
          - Add project contribution guidance.

          ## Install

          Download `main.js`, `manifest.json`, and `styles.css`, then copy them into your vault's `.obsidian/plugins/codeian/` folder.
          EOF

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" main.js manifest.json styles.css \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file release-notes.md
